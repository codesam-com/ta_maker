name: Fetch And Evaluate Generated Image

on:
  workflow_dispatch:
    inputs:
      generated_image_url:
        description: "Direct URL to generated.png produced by Kaggle"
        required: false
        type: string
  repository_dispatch:
    types: [evaluate]

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pillow numpy scikit-image requests

      - name: Prepare outputs directory
        run: mkdir -p outputs

      - name: Resolve generated image URL
        id: resolve_url
        env:
          INPUT_URL: ${{ inputs.generated_image_url }}
          CLIENT_URL: ${{ github.event.client_payload.generated_image_url }}
        run: |
          URL="${INPUT_URL}"
          if [ -z "$URL" ]; then
            URL="${CLIENT_URL}"
          fi
          echo "generated_image_url=$URL" >> "$GITHUB_OUTPUT"
          if [ -z "$URL" ]; then
            echo "No generated_image_url provided."
            exit 1
          fi

      - name: Download generated image
        run: |
          curl -L "${{ steps.resolve_url.outputs.generated_image_url }}" -o outputs/generated.png
          test -s outputs/generated.png
          ls -lh outputs/generated.png

      - name: Run evaluation
        run: python evaluation/evaluate.py

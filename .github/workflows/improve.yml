name: Improve Pipeline

on:
  repository_dispatch:
    types: [improve]

jobs:
  improve:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Improvement step
        run: echo "Pipeline improvement iteration"

      - name: Trigger generate again
        run: |
          curl -X POST -H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/${{ github.repository }}/dispatches -d '{"event_type":"generate"}'

name: Generate Image

on:
  workflow_dispatch:
  repository_dispatch:
    types: [generate]

permissions:
  contents: read
  actions: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        run: |
          pip install --upgrade pip "setuptools<82" wheel packaging
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu118
          pip install pillow

      - name: Ensure models dir
        run: mkdir -p models

      - name: Clone A1111
        run: git clone https://github.com/AUTOMATIC1111/stable-diffusion-webui.git

      - name: Prepare A1111 venv
        run: |
          cd stable-diffusion-webui
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip "setuptools<82" wheel packaging
          pip install --no-build-isolation https://github.com/openai/CLIP/archive/d50d76daa670286dd6cacf3bcd80b5e4823fc8e1.zip

      - name: Start A1111
        run: |
          cd stable-diffusion-webui
          source venv/bin/activate

          echo "Starting A1111..."
          python launch.py --api --skip-torch-cuda-test --use-cpu all --no-half --precision full > log.txt 2>&1 &

          echo "Streaming logs in real time:"
          tail -n 20 -f log.txt &

          echo "Waiting for A1111 API..."
          until curl -s http://127.0.0.1:7860/sdapi/v1/samplers > /dev/null; do
            echo "[WAIT] still initializing..."
            sleep 5
          done

          echo "A1111 is ready"

      - name: Generate
        run: |
          mkdir -p outputs
          cat <<EOF > payload.json
          {
            "prompt": "test",
            "steps": 1,
            "cfg_scale": 1,
            "width": 512,
            "height": 512,
            "sampler_name": "Euler",
            "seed": 1
          }
          EOF

          curl -X POST http://127.0.0.1:7860/sdapi/v1/txt2img \
          -H "Content-Type: application/json" \
          -d @payload.json > response.json

      - name: Save image
        run: |
          python - <<EOF
          import json, base64, io
          from PIL import Image
          img = base64.b64decode(json.load(open('response.json'))['images'][0])
          Image.open(io.BytesIO(img)).save('outputs/generated.png')
          EOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-image
          path: outputs/generated.png
